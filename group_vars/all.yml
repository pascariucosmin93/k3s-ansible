---
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

vm_hostname: vm-rui
vm_admin_user: cosmin
vm_admin_groups:
  - sudo
vm_admin_shell: /bin/bash
vm_admin_ssh_keys: []
vm_enable_passwordless_sudo: true

bootstrap_upgrade_packages: true
bootstrap_reboot_after_upgrade: false
bootstrap_timezone: Europe/Bucharest
bootstrap_enable_qemu_guest_agent: true
bootstrap_enable_ufw: false
bootstrap_ufw_allowed_tcp_ports:
  - 22
  - 6443
bootstrap_common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - fail2ban
  - git
  - htop
  - jq
  - net-tools
  - sudo
  - unzip
  - vim

docker_users:
  - "{{ vm_admin_user }}"

k3s_write_kubeconfig_mode: "0644"
k3s_token: ""
k3s_cluster_init: false
k3s_disable:
  - traefik
k3s_kube_apiserver_args: []
k3s_node_labels: []
k3s_env: {}
