---
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/.ssh/id_ed25519

vm_admin_user: cosmin
vm_admin_groups:
  - sudo
vm_admin_shell: /bin/bash
vm_admin_ssh_keys: []

bootstrap_upgrade_packages: true
bootstrap_reboot_after_upgrade: false
bootstrap_timezone: Europe/Bucharest
bootstrap_common_packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - git
  - htop
  - jq
  - net-tools
  - sudo
  - unzip
  - vim

docker_users:
  - "{{ vm_admin_user }}"

k3s_kube_apiserver_args:
  - "--write-kubeconfig-mode=644"
k3s_disable:
  - traefik
k3s_node_labels: []
k3s_env: {}
